<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bộ Đếm</title>
    <link rel="shortcut icon" href="/bo-dem.png" type="image/x-icon">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        :root {
            --bg-page: #f8fafc; /* Nền trang web hơi xám nhẹ để làm nổi bật khung app */
            --bg-app: #ffffff;
            --grid-color: #e2e8f0;
            --border-color: #cbd5e1;
            --orange: #f97316;
            --danger: #ef4444;
            --card-text-light: #ffffff;
            --card-text-dark: #1f2937;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-page);
            color: var(--card-text-dark);
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 20px 20px;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 1. KHUNG BAO QUANH TẤT CẢ NỘI DUNG */
        .app-container {
            width: 100%;
            max-width: 500px;
            background-color: var(--bg-app);
            border: 2px solid var(--border-color);
            border-radius: 24px;
            padding: 1.5rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* 2. KHUNG CỦA HEADER */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.2rem;
            border: 2px solid var(--border-color);
            border-radius: 16px;
            background-color: #f8fafc; /* Màu nền hơi khác chút để phân biệt */
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--card-text-dark);
        }

        .header-title i {
            color: #f59e0b;
            font-size: 1.4rem;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn-head {
            background: none;
            border: none;
            color: var(--card-text-dark);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px;
            transition: transform 0.1s, color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-head:hover {
            color: var(--orange);
        }

        .btn-head.primary {
            color: var(--orange);
            font-size: 1.6rem;
        }

        .btn-head:active {
            transform: scale(0.85);
        }

        /* Danh sách thẻ */
        .counters-list {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            /* Đảm bảo danh sách không bị tràn ra ngoài nếu quá dài (có thể thêm cuộn nếu muốn) */
            max-height: 65vh; 
            overflow-y: auto;
            padding-right: 5px; /* Để chừa chỗ cho thanh cuộn */
        }

        /* Tùy chỉnh thanh cuộn cho đẹp */
        .counters-list::-webkit-scrollbar {
            width: 6px;
        }
        .counters-list::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
        }

        .counter-card {
            border-radius: 16px;
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.15s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            /* Tránh thẻ bị co nhỏ khi có thanh cuộn */
            flex-shrink: 0; 
        }

        .card-header-actions {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .btn-action {
            background: none;
            border: none;
            color: inherit;
            opacity: 0.6;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn-action:hover, .btn-action:active {
            opacity: 1;
            transform: scale(1.1);
        }

        .card-title {
            text-transform: uppercase;
            font-size: 1.15rem;
            font-weight: 700;
            text-align: left;
            flex-grow: 1;
        }

        .card-main {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            width: 100%;
            padding: 1rem 0;
        }

        .count-display {
            font-size: 5rem;
            font-weight: 800;
            line-height: 1;
            min-width: 80px;
            text-align: center;
        }

        .btn-ctrl {
            background: none;
            border: none;
            font-size: 2.2rem;
            font-weight: bold;
            color: inherit;
            opacity: 0.8;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            transition: all 0.15s;
            user-select: none;
        }

        .btn-ctrl:active {
            opacity: 1;
            transform: scale(1.15);
        }

        /* Bảng màu thẻ */
        .card-0 { background-color: #0a7f9a; color: var(--card-text-light); } 
        .card-1 { background-color: #fdbd5e; color: var(--card-text-dark); } 
        .card-2 { background-color: #ea9fcf; color: var(--card-text-dark); } 

        /* MODAL LỊCH SỬ (Giữ nguyên) */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(3px);
        }

        .modal-content {
            background-color: #fff;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .modal-header {
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 1.2rem;
            color: var(--card-text-dark);
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0;
        }

        .modal-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-clear-history {
            background: none;
            border: none;
            font-size: 1.2rem;
            color: var(--danger);
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            opacity: 0.8;
            display: flex;
            align-items: center;
        }

        .btn-clear-history:hover {
            opacity: 1;
        }

        .btn-clear-history:active {
            transform: scale(0.9);
        }

        .btn-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #888;
            cursor: pointer;
            transition: color 0.2s;
            display: flex;
            align-items: center;
        }

        .btn-close:hover {
            color: var(--card-text-dark);
        }

        .modal-body {
            padding: 1rem 1.5rem;
            overflow-y: auto;
            flex-grow: 1;
        }

        .history-item {
            border-bottom: 1px dashed #eee;
            padding: 12px 0;
        }
        .history-item:last-child {
            border-bottom: none;
        }

        .hist-date {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .hist-detail {
            font-size: 1rem;
            font-weight: 500;
            color: var(--card-text-dark);
            line-height: 1.4;
        }
        
        .hist-detail span {
            color: var(--orange);
            font-weight: 700;
        }

        .empty-history {
            text-align: center;
            color: #aaa;
            padding: 3rem 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        
        .empty-history i {
            font-size: 2.5rem;
            color: #ddd;
        }

        .empty-state-main {
            text-align: center;
            color: #8d99ae;
            padding-top: 2rem;
            padding-bottom: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .empty-state-main i {
            font-size: 3.5rem;
            color: #cbd5e1;
        }

    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="app-header">
            <div class="header-title">
                <i class="bi bi-trophy-fill"></i> Count Pro
            </div>
            <div class="header-actions">
                <button class="btn-head" onclick="openHistory()" title="Xem lịch sử">
                    <i class="bi bi-clock-history"></i>
                </button>
                <button class="btn-head" onclick="resetAllCounters()" title="Reset Tất cả">
                    <i class="bi bi-arrow-clockwise"></i>
                </button>
                <button class="btn-head primary" onclick="addNewCounter()" title="Thêm bộ đếm">
                    <i class="bi bi-plus-circle-fill"></i>
                </button>
            </div>
        </div>

        <div class="counters-list" id="app"></div>
        
    </div>

    <div class="modal-overlay" id="historyModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="bi bi-journal-text"></i> Lịch sử Reset</h2>
                <div class="modal-actions">
                    <button class="btn-clear-history" onclick="clearAllHistory()" title="Xóa toàn bộ lịch sử">
                        <i class="bi bi-trash3-fill"></i>
                    </button>
                    <button class="btn-close" onclick="closeHistory()" title="Đóng">
                        <i class="bi bi-x-lg"></i>
                    </button>
                </div>
            </div>
            <div class="modal-body" id="historyList">
                </div>
        </div>
    </div>

    <script>
        const DATA_KEY = 'countAppData_v8';
        const HISTORY_KEY = 'countHistoryData_v8';
        
        let counters = JSON.parse(localStorage.getItem(DATA_KEY)) || [];
        let historyLogs = JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];

        function saveToStorage() {
            localStorage.setItem(DATA_KEY, JSON.stringify(counters));
        }

        function saveHistoryToStorage() {
            localStorage.setItem(HISTORY_KEY, JSON.stringify(historyLogs));
        }

        function generateId() {
            return Math.random().toString(36).substr(2, 9);
        }

        function getCurrentDateTime() {
            const now = new Date();
            return now.toLocaleString('vi-VN', { 
                day: '2-digit', month: '2-digit', year: 'numeric', 
                hour: '2-digit', minute: '2-digit', second: '2-digit' 
            });
        }

        function addNewCounter() {
            const name = prompt('Nhập tên cho bộ đếm mới:');
            if (name && name.trim() !== '') {
                const newCounter = { id: generateId(), name: name.trim(), value: 0 };
                counters.unshift(newCounter);
                saveToStorage();
                renderUI();
            }
        }

        function updateValue(id, change) {
            const index = counters.findIndex(c => c.id === id);
            if (index !== -1) {
                const newValue = counters[index].value + change;
                counters[index].value = newValue >= 0 ? newValue : 0;
                saveToStorage();
                document.getElementById(`count-${id}`).innerText = counters[index].value;
            }
        }

        function deleteCounter(id) {
            if(confirm('Bạn có chắc chắn muốn xóa bộ đếm này vĩnh viễn?')) {
                counters = counters.filter(c => c.id !== id);
                saveToStorage();
                renderUI();
            }
        }

        function addHistoryLog(message) {
            historyLogs.unshift({
                id: generateId(),
                datetime: getCurrentDateTime(),
                content: message
            });
            if (historyLogs.length > 100) historyLogs.pop();
            saveHistoryToStorage();
        }

        function resetAllCounters() {
            if (counters.length === 0) return;
            
            const activeCounters = counters.filter(c => c.value > 0);
            
            if (activeCounters.length === 0) {
                alert("Tất cả bộ đếm đã ở mức 0!");
                return;
            }

            if (confirm('Bạn muốn reset TẤT CẢ bộ đếm về 0?')) {
                let logDetails = activeCounters.map(c => `${c.name} (${c.value})`).join(', ');
                addHistoryLog(`Đã reset: <span>${logDetails}</span>`);

                counters.forEach(c => c.value = 0);
                saveToStorage();
                renderUI();
            }
        }

        function clearAllHistory() {
            if (historyLogs.length === 0) {
                alert("Lịch sử hiện đang trống!");
                return;
            }

            if (confirm('Bạn có chắc chắn muốn xóa TOÀN BỘ lịch sử reset không? Hành động này không thể hoàn tác.')) {
                historyLogs = [];
                saveHistoryToStorage();
                openHistory();
            }
        }

        const cardColors = ['card-0', 'card-1', 'card-2'];

        function renderUI() {
            const appContainer = document.getElementById('app');
            appContainer.innerHTML = '';

            if (counters.length === 0) {
                appContainer.innerHTML = `
                    <div class="empty-state-main">
                        <i class="bi bi-inbox"></i>
                        <p>Chưa có dữ liệu</p>
                    </div>
                `;
                return;
            }

            counters.forEach((counter, index) => {
                const colorClass = cardColors[index % cardColors.length];
                const card = document.createElement('div');
                card.className = `counter-card ${colorClass}`;
                
                card.innerHTML = `
                    <div class="card-header-actions">
                        <div class="card-title">${counter.name}</div>
                        <button class="btn-action" onclick="deleteCounter('${counter.id}')" title="Xóa bộ đếm">
                            <i class="bi bi-trash3-fill"></i>
                        </button>
                    </div>
                    
                    <div class="card-main">
                        <button class="btn-ctrl" onclick="updateValue('${counter.id}', -1)">
                            <i class="bi bi-dash"></i>
                        </button>
                        <div class="count-display" id="count-${counter.id}">${counter.value}</div>
                        <button class="btn-ctrl" onclick="updateValue('${counter.id}', 1)">
                            <i class="bi bi-plus"></i>
                        </button>
                    </div>
                `;
                appContainer.appendChild(card);
            });
        }

        function openHistory() {
            const modal = document.getElementById('historyModal');
            const listContainer = document.getElementById('historyList');
            
            listContainer.innerHTML = ''; 
            
            if (historyLogs.length === 0) {
                listContainer.innerHTML = `
                    <div class="empty-history">
                        <i class="bi bi-clock-history"></i>
                        <span>Chưa có lịch sử reset nào.</span>
                    </div>`;
            } else {
                historyLogs.forEach(log => {
                    const item = document.createElement('div');
                    item.className = 'history-item';
                    item.innerHTML = `
                        <div class="hist-date"><i class="bi bi-calendar-event"></i> ${log.datetime}</div>
                        <div class="hist-detail">${log.content}</div>
                    `;
                    listContainer.appendChild(item);
                });
            }
            
            modal.style.display = 'flex';
        }

        function closeHistory() {
            document.getElementById('historyModal').style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('historyModal');
            if (event.target == modal) {
                closeHistory();
            }
        }

        renderUI();
    </script>
</body>
</html>
